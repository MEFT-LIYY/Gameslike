<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>游戏目录 - 首页</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<header class="header">
  <div class="container nav">
    <div class="brand" style="gap:12px">
      <span class="logo"></span>
      <span class="brand-name">Games 目录</span>
    </div>
    <div class="actions">
      <button id="themeToggle" class="toggle" aria-label="切换主题">🌙 夜间</button>
    </div>
  </div>
  <div class="container">
    <div class="filters">
      <div class="search"><span class="icon">🔎</span><input id="q" type="search" placeholder="搜索名称…" /></div>
      <button class="chip active" data-filter="all">全部</button>
      <button class="chip" data-filter="推荐">推荐</button>
      <button class="chip" data-filter="最新">最新</button>
      <div class="sort">
        <label style="color:var(--muted);font-size:13px">排序：</label>
        <select id="sortSel"><option value="default">默认</option><option value="date">日期（新→旧）</option><option value="views">浏览量（高→低）</option></select>
        <label style="color:var(--muted);font-size:13px;margin-left:8px">每页：</label>
        <select id="pageSizeSel"><option>12</option><option>24</option><option>48</option></select>
      </div>
    </div>
  </div>
</header>
<main class="container">
  <section id="grid" class="grid"></section>
  <div id="empty" class="empty" style="display:none">没有匹配的结果</div>
  <div id="pager" class="pager" style="display:none">
    <button id="prevBtn" class="btn">上一页</button>
    <div id="pageNumbers" class="page-numbers"></div>
    <button id="nextBtn" class="btn">下一页</button>
  </div>
</main>
<footer class="footer">
  <div class="container">
    <div><strong>声明：</strong>请不要在咸鱼平台上报游戏名称，可微信和QQ上交流，感谢老板的配合。</div>
    <div class="wx">如需获取资源，请添加微信或者QQ：<strong>微信：lyz7595,<QQ:1283088723></QQ:1283088723></strong></div>
  </div>
</footer>
<script src="./js/app.js"></script>
</body>
</html>
